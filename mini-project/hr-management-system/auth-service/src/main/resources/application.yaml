server:
  port: 8081

spring:
  application:
    name: auth-service


  datasource:
    url: jdbc:mysql://localhost:3306/db_auth
    username: root
    password: root

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: vn.amela.authservice.entity

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: "local-dev-secret-key-must-be-at-least-32-characters"
    expiration-ms: 900000
    refresh-expiration-days: 7