server:
  port: 8080

spring:
  application:
    name: gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-public
              order: 0
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/login,/api/auth/register,/api/auth/refresh
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@ipKeyResolver}"
                    redis-rate-limiter.replenishRate: 2
                    redis-rate-limiter.burstCapacity: 5
                    redis-rate-limiter.requestedTokens: 1
            - id: auth-service
              order: 10
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userKeyResolver}"
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
            - id: employee-service
              uri: lb://EMPLOYEE-SERVICE
              predicates:
                - Path=/api/employees/**,/api/departments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userKeyResolver}"
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1
            - id: leave-service
              uri: lb://LEAVE-SERVICE
              predicates:
                - Path=/api/leaves/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userKeyResolver}"
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-characters}
    issuer: ${JWT_ISSUER:hr-auth-service}
    audience: ${JWT_AUDIENCE:hr-management-system}

gateway:
  pre-auth-rate-limit:
    enabled: true
    replenish-rate: 30
    burst-capacity: 60
    requested-tokens: 1
  public-paths:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/refresh
    - /actuator/health
    - /actuator/info
  authorization-rules:
    - path: /api/auth/admin/**
      roles: [HR]
    - path: /api/employees/**
      methods: [POST, PUT, DELETE]
      roles: [HR]
    - path: /api/departments/**
      methods: [POST, PUT, DELETE]
      roles: [HR]
