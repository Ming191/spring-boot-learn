server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**
            - id: employee-service
              uri: lb://EMPLOYEE-SERVICE
              predicates:
                - Path=/api/employees/**,/api/departments/**
            - id: leave-service
              uri: lb://LEAVE-SERVICE
              predicates:
                - Path=/api/leaves/**
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-characters}
    issuer: ${JWT_ISSUER:hr-auth-service}
    audience: ${JWT_AUDIENCE:hr-management-system}

gateway:
  public-paths:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/refresh
    - /actuator/health
    - /actuator/info
  authorization-rules:
    - path: /api/auth/admin/**
      roles: [HR]
    - path: /api/employees/**
      methods: [POST, PUT, DELETE]
      roles: [HR]
    - path: /api/departments/**
      methods: [POST, PUT, DELETE]
      roles: [HR]
  rate-limit:
    enabled: true
    default-policy:
      capacity: 60
      refill-tokens: 60
      refill-period: 1m
