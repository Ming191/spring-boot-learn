server:
  port: 8083

spring:
  application:
    name: employee-service

  datasource:
    url: ${EMP_DB_URL:jdbc:mysql://localhost:3306/db_emp}
    username: ${EMP_DB_USERNAME:root}
    password: ${EMP_DB_PASSWORD:root}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: vn.amela.employeeservice.entity
  configuration:
    map-underscore-to-camel-case: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
