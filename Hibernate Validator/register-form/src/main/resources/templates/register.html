<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Registration Form</title>
    <style>.error { color: red; font-size: 0.9em; }</style>
</head>
<body>
<form th:action="@{/user/register-form}" th:object="${registerForm}" method="post">
    <h1>Registration Form</h1>
    <hr>

    <div>
        <label>Mail:</label>
        <label>
            <input type="text" th:field="*{mail}" placeholder="Enter email" />
        </label>
        <p class="error" th:if="${#fields.hasErrors('mail')}" th:errors="*{mail}"></p>
    </div>

    <div>
        <label>Username:</label>
        <label>
            <input type="text" th:field="*{username}" placeholder="Enter username" />
        </label>
        <p class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
    </div>

    <div>
        <label>Password:</label>
        <label>
            <input type="password" th:field="*{password}" placeholder="******" />
        </label>
        <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
    </div>

    <div>
        <label>Password Confirm:</label>
        <label>
            <input type="password" th:field="*{passwordConfirm}" placeholder="******" />
        </label>
        <p class="error" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></p>
    </div>

    <button type="submit">Register</button>
</form>
</body>
</html>
