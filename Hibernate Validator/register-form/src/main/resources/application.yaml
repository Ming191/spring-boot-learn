spring:
  application:
    name: RegisterForm
  datasource:
    url: jdbc:postgresql://localhost:5432/my_db
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect