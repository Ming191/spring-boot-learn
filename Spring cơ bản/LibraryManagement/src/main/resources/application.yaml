spring:
  application:
    name: LibraryManagement
  datasource:
    url: jdbc:postgresql://localhost:5432/library_db
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect